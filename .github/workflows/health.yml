name: Health monitor

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: notify-health
  cancel-in-progress: false

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r notify/requirements.txt
      - env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHANNEL_ID: ${{ secrets.TG_CHANNEL_ID }}
          BOT_WALLET: ${{ vars.BOT_WALLET || '5YDHipThEddE5jr7AcRkcdkUofeiqWBukSwLgZcmFjSP' }}
          WATCHED_WALLETS: ${{ vars.WATCHED_WALLETS }}
          RPC_URL: ${{ vars.RPC_URL || 'https://solana-rpc.publicnode.com' }}
        run: python notify/health.py
      - name: Commit state if changed
        run: |
          if [[ -n "$(git status --porcelain notify/state.json)" ]]; then
            git config user.name 'github-actions[bot]'
            git config user.email 'github-actions[bot]@users.noreply.github.com'
            git add notify/state.json
            git commit -m "chore(notify): health state [skip ci]"
            git push
          fi
